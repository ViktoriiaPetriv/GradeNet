version: '3.8'

services:
  postgres-db:
    image: postgres:16-alpine
    container_name: postgres
    restart: always
    env_file:
      - .env
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./logs/postgres:/var/log/postgresql
      - ./init.sql:/docker-entrypoint-initdb.d/01-init-databases.sql
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: UTC
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - grade-net-network

  org-service-app:
    image: gradenet-org-service:${IMAGE_TAG:-latest}
    build:
      context: ./org-service
      dockerfile: Dockerfile
    container_name: org-service-app
    restart: always
    env_file:
      - .env
    ports:
      - "127.0.0.1:${ORG_APP_PORT:-8081}:8081"
      - "127.0.0.1:${ORG_DEBUG_PORT:-5006}:5006"
    volumes:
      - ./logs/org_app:/logs
    depends_on:
      postgres-db:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-db:5432/${ORG_POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SERVER_PORT: ${ORG_APP_PORT:-8081}
      JWT_SECRET: ${JWT_SECRET}
    networks:
      - grade-net-network

  user-service-app:
    image: gradenet-user-service:${IMAGE_TAG:-latest}
    build:
      context: ./user-service
      dockerfile: Dockerfile
    container_name: user-service-app
    restart: always
    env_file:
      - .env
    ports:
      - "127.0.0.1:${USER_APP_PORT:-8080}:8080"
      - "127.0.0.1:${USER_DEBUG_PORT:-5005}:5005"
    volumes:
      - ./logs/user_app:/logs
    depends_on:
      postgres-db:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-db:5432/${USER_POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SERVER_PORT: ${USER_APP_PORT:-8080}
      JWT_SECRET: ${JWT_SECRET}
      ORG_SERVICE_URL: http://org-service-app:${ORG_APP_PORT:-8081}
    networks:
      - grade-net-network

  grade-service-app:
    image: gradenet-grade-service:${IMAGE_TAG:-latest}
    build:
      context: ./grade-service
      dockerfile: Dockerfile
    container_name: grade-service-app
    restart: always
    env_file:
      - .env
    ports:
      - "127.0.0.1:${GRADE_APP_PORT:-8082}:8082"
      - "127.0.0.1:${GRADE_DEBUG_PORT:-5007}:5007"
    volumes:
      - ./logs/grade_app:/logs
    depends_on:
      postgres-db:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-db:5432/${GRADE_POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SERVER_PORT: ${GRADE_APP_PORT:-8082}
      JWT_SECRET: ${JWT_SECRET}
      ORG_SERVICE_URL: http://org-service-app:${ORG_APP_PORT:-8081}
      USER_SERVICE_URL: http://user-service-app:${USER_APP_PORT:-8080}
    networks:
      - grade-net-network

networks:
  grade-net-network:
    driver: bridge

volumes:
  postgres_data: