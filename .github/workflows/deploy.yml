name: Build & Deploy

on:
  push:
    branches: [master]

env:
  OWNER: ${{ github.repository_owner }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push backend services
        run: |
          TAG=${{ github.sha }}
          OWNER=$(echo "${{ env.OWNER }}" | tr '[:upper:]' '[:lower:]')
          for SERVICE in org-service user-service grade-service integration-service; do
            docker build \
              -t ghcr.io/${OWNER}/gradenet-${SERVICE}:${TAG} \
              -t ghcr.io/${OWNER}/gradenet-${SERVICE}:latest \
              ./${SERVICE}
            docker push ghcr.io/${OWNER}/gradenet-${SERVICE}:${TAG}
            docker push ghcr.io/${OWNER}/gradenet-${SERVICE}:latest
          done

      - name: Build & Push frontend
        run: |
          TAG=${{ github.sha }}
          OWNER=$(echo "${{ env.OWNER }}" | tr '[:upper:]' '[:lower:]')
          docker build \
            -t ghcr.io/${OWNER}/gradenet-frontend:${TAG} \
            -t ghcr.io/${OWNER}/gradenet-frontend:latest \
            ./frontend
          docker push ghcr.io/${OWNER}/gradenet-frontend:${TAG}
          docker push ghcr.io/${OWNER}/gradenet-frontend:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Copy files to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          source: "docker-compose.yml,init.sql"
          target: "/opt/app"

      - name: Deploy on VM
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            cd /opt/app

            OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')

            cat > .env << EOF
            GITHUB_OWNER=${OWNER}
            IMAGE_TAG=${{ github.sha }}
            POSTGRES_USER=${{ secrets.POSTGRES_USER }}
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            USER_POSTGRES_DB=${{ secrets.USER_POSTGRES_DB }}
            ORG_POSTGRES_DB=${{ secrets.ORG_POSTGRES_DB }}
            GRADE_POSTGRES_DB=${{ secrets.GRADE_POSTGRES_DB }}
            USER_APP_PORT=8080
            ORG_APP_PORT=8081
            GRADE_APP_PORT=8082
            INTEGRATION_APP_PORT=8083
            POSTGRES_PORT=5433
            EOF

            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f