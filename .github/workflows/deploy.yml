name: Build & Deploy

on:
  push:
    branches: [master]

env:
  OWNER: ${{ github.repository_owner }}
  REGISTRY: ghcr.io

jobs:
  build-backend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        service: [org-service, user-service, grade-service, integration-service, add-service]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push ${{ matrix.service }}
        run: |
          OWNER=$(echo "${{ env.OWNER }}" | tr '[:upper:]' '[:lower:]')
          TAG=${{ github.sha }}
          IMAGE=ghcr.io/${OWNER}/gradenet-${{ matrix.service }}
          docker buildx build \
            --platform linux/arm64 \
            --cache-from type=registry,ref=${IMAGE}:cache \
            --cache-to   type=registry,ref=${IMAGE}:cache,mode=max \
            -t ${IMAGE}:${TAG} \
            -t ${IMAGE}:latest \
            --push \
            ./${{ matrix.service }}

  build-frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push frontend
        run: |
          OWNER=$(echo "${{ env.OWNER }}" | tr '[:upper:]' '[:lower:]')
          TAG=${{ github.sha }}
          IMAGE=ghcr.io/${OWNER}/gradenet-frontend
          docker buildx build \
            --platform linux/arm64 \
            --cache-from type=registry,ref=${IMAGE}:cache \
            --cache-to   type=registry,ref=${IMAGE}:cache,mode=max \
            -t ${IMAGE}:${TAG} \
            -t ${IMAGE}:latest \
            --push \
            ./frontend

  deploy:
    needs: [build-backend, build-frontend]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Copy files to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          source: "docker-compose.yml,init.sql"
          target: "/opt/app"

      - name: Deploy on VM
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            cd /opt/app

            OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')

            cat > .env << EOF
            GITHUB_OWNER=${OWNER}
            IMAGE_TAG=${{ github.sha }}
            POSTGRES_USER=${{ secrets.POSTGRES_USER }}
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            USER_POSTGRES_DB=${{ secrets.USER_POSTGRES_DB }}
            ORG_POSTGRES_DB=${{ secrets.ORG_POSTGRES_DB }}
            GRADE_POSTGRES_DB=${{ secrets.GRADE_POSTGRES_DB }}
            ADD_POSTGRES_DB=${{ secrets.ADD_POSTGRES_DB }}
            RECORD_BOOK_URL=${{ secrets.RECORD_BOOK_URL }}
            USER_APP_PORT=8080
            ORG_APP_PORT=8081
            GRADE_APP_PORT=8082
            INTEGRATION_APP_PORT=8083
            ADD_APP_PORT=8084
            POSTGRES_PORT=5433
            EOF

            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f
