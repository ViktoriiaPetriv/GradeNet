# Database configuration for Docker
spring.datasource.url=jdbc:postgresql://grade-service-db:5432/${GRADE_POSTGRES_DB}
spring.datasource.username=${GRADE_POSTGRES_USER}
spring.datasource.password=${GRADE_POSTGRES_PASSWORD}

# Server port in container
server.port=8082

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
