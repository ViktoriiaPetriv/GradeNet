# Database configuration for Docker
spring.datasource.url=jdbc:postgresql://discipline_service_db:5432/${DISCIPLINE_POSTGRES_DB}
spring.datasource.username=${DISCIPLINE_POSTGRES_USER}
spring.datasource.password=${DISCIPLINE_POSTGRES_PASSWORD}

# Server port in container
server.port=8082

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
