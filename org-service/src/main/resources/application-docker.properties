# Database configuration for Docker
spring.datasource.url=jdbc:postgresql://org_service_db:5432/${ORG_POSTGRES_DB}
spring.datasource.username=${ORG_POSTGRES_USER}
spring.datasource.password=${ORG_POSTGRES_PASSWORD}

# Server port in container
server.port=8080

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
