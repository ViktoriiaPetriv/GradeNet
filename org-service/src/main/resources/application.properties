spring.application.name=org-service
spring.config.import=optional:file:.env[.properties]

# Server Configuration
server.port=${ORG_APP_PORT:8081}

# Timezone
spring.jackson.time-zone=UTC

# Database Configuration
spring.jpa.hibernate.ddl-auto=none
spring.datasource.url=jdbc:postgresql://localhost:${ORG_POSTGRES_PORT}/${ORG_POSTGRES_DB}
spring.datasource.username=${ORG_POSTGRES_USER}
spring.datasource.password=${ORG_POSTGRES_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Properties
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.show-sql=${SHOW_SQL:false}
