spring.application.name=integration-service
server.port=8083

user-service.url=${USER_SERVICE_URL:http://localhost:8080}
org-service.url=${ORG_SERVICE_URL:http://localhost:8081}
grade-service.url=${GRADE_SERVICE_URL:http://localhost:8082}

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Journal client: "mock" reads from src/main/resources/mock-journal/, "http" calls the real API
journal.client.mode=mock
