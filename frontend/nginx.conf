    }

    # add-service :8084
    location /api/commissions {
        proxy_pass http://add-service-app:8084;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location /api/works {
        proxy_pass http://add-service-app:8084;
        proxy_set_header Host $host;
