<div class="overlay" [class.active]="isOpen()" (click)="close()"></div>

<button class="hamburger" [class.open]="isOpen()" (click)="toggle()">
    <span></span><span></span><span></span>
</button>

<nav class="sidebar" [class.open]="isOpen()">
    <div class="logo">
        <div class="logo-icon">
            <img src="logo.png" alt="GradeNet" />
        </div>
        <div class="logo-text">GradeNet</div>
    </div>

    <div class="nav-section">Навігація</div>
    <ul class="nav-links">
        <li routerLink="/users" routerLinkActive="active" (click)="close()">
            👤 Користувачі
        </li>
        <li routerLink="/books" routerLinkActive="active" (click)="close()">
            📋 Залікова книжка
        </li>
        <li routerLink="/orgs" routerLinkActive="active" (click)="close()">
            🏛️ Організації
        </li>
        <li routerLink="/specialties" routerLinkActive="active" (click)="close()">
            📚 Спеціальності
        </li>
    </ul>

    <div class="nav-divider"></div>

    <div class="nav-section">Інші</div>
    <ul class="nav-links">
        <li routerLink="/settings" routerLinkActive="active" (click)="close()">
            ⚙ Налаштування
        </li>
    </ul>

    <div class="nav-bottom">
        <div class="user-card" (click)="goToProfile()" style="cursor: pointer;">
            <div class="user-avatar"><i class="pi pi-user"></i></div>
            <div>
                <div class="user-info-name">{{ currentUser()?.email }}</div>
                <div class="user-info-role">{{ roleLabel(currentUser()?.role) }}</div>
            </div>
            <button class="logout-btn" (click)="logout(); $event.stopPropagation()">
                <i class="pi pi-sign-out"></i>
            </button>
        </div>
    </div>
</nav>
